<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>2000 Exercices de Maths</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#0f0f0f;
    color:white;
}

header{
    text-align:center;
    padding:20px;
    background:#1c1c1c;
}

h1{margin:0;}

.container{
    padding:20px;
}

.exercise{
    background:#1e1e1e;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

button{
    background:#00bcd4;
    border:none;
    padding:5px 10px;
    margin-top:5px;
    cursor:pointer;
    border-radius:5px;
}

.answer{
    display:none;
    margin-top:5px;
    color:#4caf50;
}
</style>
</head>

<body>

<header>
<h1>📚 2000 Exercices de Maths</h1>
<p>Facile → Difficile + Réponses</p>
</header>

<div class="container" id="list"></div>

<script>

// Génère un nombre aléatoire
function rand(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Génère un exercice + réponse
function generateExercise(i){
    let type = rand(1,3);

    let q, a;

    // FACILE : additions / soustractions
    if(type === 1){
        let x = rand(1,50);
        let y = rand(1,50);
        q = `${x} + ${y}`;
        a = x + y;
    }

    // MOYEN : multiplication / division
    else if(type === 2){
        let x = rand(2,20);
        let y = rand(2,15);
        q = `${x} × ${y}`;
        a = x * y;
    }

    // DIFFICILE : équations simples
    else{
        let a1 = rand(1,5);
        let b = rand(1,50);
        let c = a1 * rand(1,20);
        q = `${a1}x + ${b} = ${c}`;
        a = (c - b) / a1;
    }

    return {question:q, answer:a};
}

// créer 2000 exercices
const container = document.getElementById("list");

for(let i=1;i<=2000;i++){

    let ex = generateExercise(i);

    let div = document.createElement("div");
    div.className = "exercise";

    div.innerHTML = `
        <strong>Exercice ${i}</strong><br>
        ${ex.question}
        <br>
        <button onclick="this.nextElementSibling.style.display='block'">
            Voir la réponse
        </button>
        <div class="answer">Réponse : ${ex.answer}</div>
    `;

    container.appendChild(div);
}

</script>

</body>
</html>
